name: Backend CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-laravel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none
          extensions: mbstring, xml, ctype, iconv, pdo, pdo_sqlite, sqlite3

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend-laravel/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend-laravel/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run backend tests
        run: php vendor/bin/phpunit --configuration phpunit.xml

      - name: Run smoke API and generate markdown report
        run: |
          php artisan serve --host=127.0.0.1 --port=8000 > /tmp/laravel-smoke.log 2>&1 &
          SERVER_PID=$!
          sleep 3

          set +e
          pwsh -File scripts/smoke-api.ps1 -BaseUrl "http://127.0.0.1:8000" -SkipAuthChecks -ReportPath "storage/logs/smoke-report.md"
          SMOKE_EXIT=$?
          set -e

          kill $SERVER_PID || true
          wait $SERVER_PID 2>/dev/null || true

          exit $SMOKE_EXIT

      - name: Upload smoke markdown report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: backend-laravel/storage/logs/smoke-report.md
          if-no-files-found: warn

      - name: Comment PR with CI and smoke info
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- backend-ci-smoke-report -->';
            const status = '${{ job.status }}';
            const icon = status === 'success' ? '✅' : '❌';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const fs = require('fs');
            const reportPath = 'backend-laravel/storage/logs/smoke-report.md';
            let excerpt = '_Smoke report non disponibile in questo run._';

            if (fs.existsSync(reportPath)) {
              const raw = fs.readFileSync(reportPath, 'utf8');
              const lines = raw.split(/\r?\n/).filter(Boolean);
              const summary = lines.filter((l) => l.startsWith('- Result:') || l.startsWith('- Passed:') || l.startsWith('- Base URL:'));
              const table = lines.filter((l) => l.startsWith('| ')).slice(0, 8);
              excerpt = [...summary, '', ...table].join('\n');
            }

            const body = [
              marker,
              `### ${icon} Backend CI: ${status.toUpperCase()}`,
              '',
              '- Workflow: Backend CI',
              '- Artifact: `smoke-report`',
              `- Run details and artifacts: ${runUrl}`,
              '',
              '<details><summary>Estratto smoke report</summary>',
              '',
              '```markdown',
              excerpt,
              '```',
              '',
              '</details>',
              '',
              '_Commento aggiornato automaticamente da GitHub Actions._',
            ].join('\n');

            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
