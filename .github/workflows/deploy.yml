name: Deploy to FTP

on:
  push:
    branches:
      - release/areariservata

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, mbstring, openssl

      - name: Install Composer dependencies
        working-directory: backend-laravel
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Copy Vue build to Laravel public/
        run: cp -r frontend/dist/. backend-laravel/public/

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 82.198.227.235
          port: 21
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: './backend-laravel/'
          server-dir: '/domains/francescociappa.eu/public_html/areariservata/'
          exclude: |
            **/.git/**
            **/.gitignore
            **/README.md
            **/.env
            **/.env.*
            **/tests/**
            **/storage/logs/**
            **/.editorconfig
            **/phpunit.xml
            **/phpunit.xml.dist
