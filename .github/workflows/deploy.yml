name: Deploy to FTP

on:
  push:
    branches:
      - release/areariservata

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 82.198.227.235
          port: 21
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: './'
          server-dir: '/domains/francescociappa.eu/public_html/areariservata/'
          exclude: |
            **/.git/**
            **/.github/**
            **/.omc/**
            **/node_modules/**
            database/
            backend/.env
            backend/.env.development
            setup.js
            README.md
